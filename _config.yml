# This config file is meant for settings that affect your whole blog, values which you are expected to set up once and rarely need to edit after that.
# You can get access to RAW repository from this address: https://github.com/ericdaat/research-lab-website
# Jekyll

# Site settings
title: LCE Smart Resource Management Team
email: your-email@domain.com
description: > # this means to ignore newlines until "baseurl:"
  #It will appear in your document head meta (for Google search results) and in your feed.xml site description.
  LCA Experts in IGT section at the University of Southern Denmark.
baseurl: ""
url: "https://sdu-lce-smart.github.io"

include:
  - .htaccess
  - _pages

sass:
  sass_dir: _sass

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true # default for kramdown is false. This will enable using Markdown links

